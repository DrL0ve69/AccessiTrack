trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

# Chargement du groupe de variables globalement
variables:
  - group: accessitrack-secrets
  - name: buildConfiguration
    value: 'Release'
  - name: dotnetVersion
    value: '10.0.x'
  - name: nodeVersion
    value: '22.x'

stages:
- stage: Build_And_Test
  displayName: 'Build et Tests'
  jobs:
  - job: Backend
    displayName: 'Backend .NET 10'
    workspace:
      clean: all
    steps:
    - checkout: self
      clean: true
      
    - task: UseDotNet@2
      displayName: 'Installer .NET 10'
      inputs:
        version: $(dotnetVersion)
        
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: 'Restore NuGet packages'
      
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: 'Build solution'
      
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: 'Publish API'
      
    - task: PublishBuildArtifacts@1
      displayName: 'Publier artefact API'
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: 'Frontend Angular'
    steps:
    - task: UseNode@1
      displayName: 'Installer Node.js'
      inputs:
        version: $(nodeVersion)
        
    - powershell: |
        cd Frontend/Accessitrack.client
        npm install
        npx ng build --configuration production
      displayName: 'npm install et ng build'
      
    - task: PublishBuildArtifacts@1
      displayName: 'Publier artefact Frontend'
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist/Accessitrack.client'
        artifactName: frontend

- stage: Deploy_Production
  displayName: 'Deploiement Production'
  dependsOn: Build_And_Test
  # S'exécute uniquement si le build réussit et qu'on est sur la branche main
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: Deploy_API
    displayName: 'Deployer API via Kudu'
    steps:
    - download: current
      artifact: api

    - task: ArchiveFiles@2
      displayName: 'Créer l archive ZIP pour déploiement'
      inputs:
        rootFolderOrFile: '$(Pipeline.Workspace)/api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/deploy.zip'
        replaceExistingArchive: true

    - task: PowerShell@2
      displayName: 'Push Zip via Kudu API (avec curl)'
      inputs:
        targetType: 'inline'
        script: |
          # Nettoyage de l'URL
          $urlBase = "$(AZ_URL)".Replace("https://", "").TrimEnd('/')
          $fullUrl = "https://$urlBase/api/zipdeploy"
          $zipPath = "$(Build.ArtifactStagingDirectory)/deploy.zip"
          
          Write-Host "Cible : $fullUrl"
          Write-Host "Envoi du fichier ZIP avec curl.exe..."
          
          # Utilisation de curl.exe natif
          curl.exe -f -X POST -u "$($env:DEPLOY_USER):$($env:DEPLOY_PWD)" --data-binary "@$zipPath" "$fullUrl"
          
          # Vérification du résultat de curl
          if ($LASTEXITCODE -eq 0) {
              Write-Host "##[section]DÉPLOIEMENT TERMINÉ AVEC SUCCÈS"
          } else {
              Write-Host "##[error] ÉCHEC DU DÉPLOIEMENT avec curl. Code d'erreur : $LASTEXITCODE"
              exit 1
          }
      env:
        # MAPPAGE OBLIGATOIRE DES SECRETS
        DEPLOY_USER: $(AZ_USER)
        DEPLOY_PWD: $(AZ_PWD)
