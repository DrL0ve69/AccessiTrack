trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: Release
  dotnetVersion: 10.0.x
  nodeVersion: 22.x

stages:
- stage: Build_And_Test
  displayName: Build et Tests
  jobs:
  - job: Backend
    displayName: Backend .NET 10
    steps:
    - task: UseDotNet@2
      displayName: Installer .NET 10
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: Restore NuGet packages
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build solution
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact API
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: Frontend Angular
    steps:
    - task: NodeTool@0
      displayName: Installer Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd Frontend/Accessitrack.client
        call npm install
        call npx ng build --configuration production
      displayName: npm install et ng build
      
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact Frontend
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: Deploiement Production
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: Deployer API via Kudu Zip Push
    steps:
    - download: current
      artifact: api

    - powershell: |
        $userName = '$(AZ_USER)'
        $password = '$(AZ_PWD)'
        $apiUrl = "https://$(AZ_URL)/api/zipdeploy"
        
        # 1. Préparation des chemins
        $sourceDir = "$(Pipeline.Workspace)\api"
        $zipPath = "$(Pipeline.Workspace)\deploy.zip" # Nom plus simple
        
        # 2. Nettoyage si un ancien ZIP existe
        if (Test-Path $zipPath) { 
            Remove-Item $zipPath -Force -ErrorAction SilentlyContinue 
        }

        # 3. Compression optimisée
        Write-Host "Compression du contenu de $sourceDir..."
        # On se déplace dans le dossier pour que le ZIP ne contienne pas le dossier 'api' lui-même
        Push-Location $sourceDir
        Compress-Archive -Path * -DestinationPath $zipPath -Force
        Pop-Location

        # 4. Authentification
        $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(("{0}:{1}" -f $userName, $password)))
        $headers = @{ Authorization = "Basic $base64Auth" }

        # 5. Envoi avec diagnostic
        Write-Host "Envoi vers Azure (Zip Push)..."
        try {
            Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
            Write-Host "TERMINÉ : L'API a été déployée !"
        }
        catch {
            $errorMessage = $_.Exception.Message
            Write-Host "ERREUR : $errorMessage"
            if ($_.Exception.Response) {
                $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                Write-Host "Détails serveur : $($reader.ReadToEnd())"
            }
            exit 1
        }
      displayName: 'Déployer API (Fix 400)'
