trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: Release
  dotnetVersion: 10.0.x
  nodeVersion: 22.x

stages:
- stage: Build_And_Test
  displayName: Build et Tests
  jobs:
  - job: Backend
    displayName: Backend .NET 10
    steps:
    - task: UseDotNet@2
      displayName: Installer .NET 10
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: Restore NuGet packages
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build solution
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact API
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: Frontend Angular
    steps:
    - task: NodeTool@0
      displayName: Installer Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd Frontend/Accessitrack.client
        call npm install
        call npx ng build --configuration production
      displayName: npm install et ng build
      
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact Frontend
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: Deploiement Production
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: Deployer API via Kudu Zip Push
    steps:
    - download: current
      artifact: api

    # 1. Créer le ZIP (ArchiveFiles est plus robuste sur Windows)
    - task: ArchiveFiles@2
      displayName: 'Créer l archive ZIP'
      inputs:
        rootFolderOrFile: '$(Pipeline.Workspace)/api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/deploy.zip'
        replaceExistingArchive: true

    # 2. Diagnostic : On vérifie si l'archive pèse bien quelques Mo
    - powershell: |
        $path = "$(Build.ArtifactStagingDirectory)/deploy.zip"
        if (Test-Path $path) {
            $size = [math]::Round((Get-Item $path).Length / 1KB, 2)
            Write-Host "##[section]ZIP créé avec succès ! Taille : $size KB"
            # Si la taille est < 100KB, c'est probablement que le dossier source était vide
            if ($size -lt 10) { Write-Host "##[warning] Le ZIP semble très petit, vérifie le contenu de l'artefact !" }
        } else {
            throw "Le fichier ZIP n'a pas été généré dans $path"
        }
      displayName: 'Vérifier ZIP'

    # 3. Envoi vers Azure Kudu
    - powershell: |
        # On construit la chaîne d'auth proprement
        $pair = "$(AZ_USER):$(AZ_PWD)"
        $bytes = [System.Text.Encoding]::ASCII.GetBytes($pair)
        $base64 = [Convert]::ToBase64String($bytes)
        
        $headers = @{
            Authorization = "Basic $base64"
        }
        
        $zipPath = "$(Build.ArtifactStagingDirectory)/deploy.zip"
        $url = "https://$(AZ_URL)/api/zipdeploy"
        
        Write-Host "Envoi en cours vers $url ..."
        
        try {
            Invoke-RestMethod -Uri $url -Method Post -Headers $headers -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
            Write-Host "##[section]DÉPLOIEMENT RÉUSSI !"
        }
        catch {
            $msg = $_.Exception.Message
            Write-Host "##[error] Erreur lors de l'envoi : $msg"
            if ($_.Exception.Response) {
                $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                $details = $reader.ReadToEnd()
                Write-Host "##[error] Détails serveur : $details"
            }
            exit 1
        }
      displayName: 'Push Zip to Azure'
