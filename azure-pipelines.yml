trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: Release
  dotnetVersion: 10.0.x
  nodeVersion: 22.x

stages:
- stage: Build_And_Test
  displayName: Build et Tests
  jobs:
  - job: Backend
    displayName: Backend .NET 10
    steps:
    - task: UseDotNet@2
      displayName: Installer .NET 10
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: Restore NuGet packages
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build solution
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact API
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: Frontend Angular
    steps:
    - task: NodeTool@0
      displayName: Installer Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd Frontend/Accessitrack.client
        call npm install
        call npx ng build --configuration production
      displayName: npm install et ng build
      
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact Frontend
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: Deploiement Production
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: Deployer API via Kudu Zip Push
    steps:
    - download: current
      artifact: api

    - powershell: |
        # 1. Récupération des variables depuis la Library
        $userName = '$(AZ_USER)'
        $password = '$(AZ_PWD)'
        $apiUrl = "https://$(AZ_URL)/api/zipdeploy"
        
        Write-Host "Tentative de déploiement vers : $apiUrl"
        Write-Host "Utilisateur : $userName"

        # 2. Création de l'authentification (Basic Auth)
        $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(("{0}:{1}" -f $userName, $password)))
        $headers = @{ 
            Authorization = "Basic $base64Auth" 
        }

        # 3. Compression des fichiers de l'API
        # On cible le dossier 'api' téléchargé depuis l'artefact
        $sourceDir = "$(Pipeline.Workspace)\api"
        $zipPath = "$(Pipeline.Workspace)\api_deploy.zip"
        
        if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
        
        Write-Host "Compression du dossier $sourceDir en cours..."
        Compress-Archive -Path "$sourceDir\*" -DestinationPath $zipPath -Force

        # 4. Envoi du package ZIP vers Azure Kudu
        Write-Host "Envoi du ZIP (Zip Push)..."
        try {
            # On utilise une méthode robuste pour l'upload de gros fichiers
            Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
            Write-Host "TERMINÉ : L'API a été déployée avec succès !"
        }
        catch {
            Write-Error "ÉCHEC DU DÉPLOIEMENT : $_"
            # Affiche plus de détails en cas d'erreur HTTP
            if ($_.Exception.Response) {
                $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
                $details = $reader.ReadToEnd()
                Write-Host "Détails de l'erreur : $details"
            }
            exit 1
        }
      displayName: 'Déployer API (Direct Zip Push final)'
