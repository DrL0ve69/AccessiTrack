trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: Release
  dotnetVersion: 10.0.x
  nodeVersion: 22.x

stages:
- stage: Build_And_Test
  displayName: Build et Tests
  jobs:
  - job: Backend
    displayName: Backend .NET 10
    steps:
    - task: UseDotNet@2
      displayName: Installer .NET 10
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: Restore NuGet packages
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build solution
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact API
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: Frontend Angular
    steps:
    - task: NodeTool@0
      displayName: Installer Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd Frontend/Accessitrack.client
        call npm install
        call npx ng build --configuration production
      displayName: npm install et ng build
      
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact Frontend
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: Deploiement Production
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: Deployer API via Kudu Zip Push
    steps:
    - download: current
      artifact: api

    - powershell: |
        # 1. Extraire les identifiants du profil de publication (Secret Library)
        $xml = [xml]'$(AZURE_WEBAPP_PUBLISH_PROFILE)'
        $profile = $xml.publishData.publishProfile | Where-Object { $_.publishMethod -eq "ZipDeploy" -or $_.publishMethod -eq "MSDeploy" }
        
        $userName = $profile.userName
        $password = $profile.userPWD
        $apiUrl = "https://$($profile.publishUrl)/api/zipdeploy"
        
        # 2. Créer l'en-tête d'authentification Basic
        $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(("{0}:{1}" -f $userName, $password)))
        
        # 3. Compresser le dossier API en ZIP (si ce n'est pas déjà fait)
        $zipPath = "$(Pipeline.Workspace)\api_deploy.zip"
        if (Test-Path $zipPath) { Remove-Item $zipPath }
        Compress-Archive -Path "$(Pipeline.Workspace)\api\*" -DestinationPath $zipPath
        
        # 4. Envoyer le ZIP directement à Azure
        Write-Host "Déploiement en cours vers $apiUrl ..."
        Invoke-RestMethod -Uri $apiUrl -Method Post -Headers @{Authorization=("Basic {0}" -f $base64AuthInfo)} -InFile $zipPath -ContentType "application/zip"
        
        Write-Host "Déploiement réussi !"
      displayName: 'Déployer API (Direct Zip Push)'
