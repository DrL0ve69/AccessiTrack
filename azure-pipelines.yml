trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: Release
  dotnetVersion: 10.0.x
  nodeVersion: 22.x

stages:
- stage: Build_And_Test
  displayName: Build et Tests
  jobs:
  - job: Backend
    displayName: Backend .NET 10
    steps:
    - task: UseDotNet@2
      displayName: Installer .NET 10
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: Restore NuGet packages
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build solution
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact API
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: Frontend Angular
    steps:
    - task: NodeTool@0
      displayName: Installer Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd Frontend/Accessitrack.client
        call npm install
        call npx ng build --configuration production
      displayName: npm install et ng build
      
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact Frontend
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: Deploiement Production
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: Deployer API via Kudu Zip Push
    steps:
    - download: current
      artifact: api

    - powershell: |
        $userName = '$(AZ_USER)'
        $password = '$(AZ_PWD)'
        $apiUrl = "https://$(AZ_URL)/api/zipdeploy"
        
        # On cherche où sont VRAIMENT les fichiers
        $possibleDir = "C:\agent\_work\1\api"
        if (-not (Test-Path "$possibleDir\AccessiTrack.API.dll")) {
            Write-Host "Recherche profonde du dossier de build..."
            $actualPath = Get-ChildItem -Path "C:\agent\_work\1" -Filter "AccessiTrack.API.dll" -Recurse | Select-Object -ExpandProperty DirectoryName -First 1
            if ($actualPath) { 
                $sourceDir = $actualPath
                Write-Host "Dossier trouvé : $sourceDir"
            } else {
                throw "Impossible de trouver les fichiers de l'API dans C:\agent\_work\1"
            }
        } else {
            $sourceDir = $possibleDir
        }

        $zipPath = "$(Build.ArtifactStagingDirectory)\deploy.zip"

        Write-Host "Contenu final du dossier avant zip :"
        Get-ChildItem -Path $sourceDir | Select-Object Name

        if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

        # Création du ZIP proprement
        Push-Location $sourceDir
        Compress-Archive -Path * -DestinationPath $zipPath -Force
        Pop-Location

        # Authentification et Envoi
        $base64Auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(("{0}:{1}" -f $userName, $password)))
        $headers = @{ Authorization = "Basic $base64Auth" }

        try {
            Write-Host "Envoi du ZIP vers Azure..."
            Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
            Write-Host "SUCCÈS : Déploiement terminé !"
        }
        catch {
            $err = $_.Exception.Response
            if ($err) {
                $reader = New-Object System.IO.StreamReader($err.GetResponseStream())
                Write-Host "Détails erreur Azure : $($reader.ReadToEnd())"
            }
            throw "Le déploiement a échoué avec l'erreur 400. Vérifie le contenu du dossier ci-dessus."
        }
      displayName: 'Déployer API (Fix Path & Zip)'
