name: Build and deploy Full Stack (AccessiTrack)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  # ----------------------------------------
  # 1. BUILD DU BACKEND (.NET 10)
  # ----------------------------------------
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore Backend/AccessiTrack.slnx

      - name: Build solution
        run: dotnet build Backend/AccessiTrack.slnx --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish Backend/AccessiTrack.API --configuration Release -o ${{env.DOTNET_ROOT}}/api

      - name: Upload API Artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-artifact
          path: ${{env.DOTNET_ROOT}}/api

  # ----------------------------------------
  # 2. BUILD DU FRONTEND (Angular 22)
  # ----------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install and build
        run: |
          cd Frontend/Accessitrack.client
          npm install
          npx ng build --configuration production

      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifact
          path: Frontend/Accessitrack.client/dist/Accessitrack.client

  # ----------------------------------------
  # 3. DEPLOIEMENT DE L'API (Sur Azure Web App)
  # ----------------------------------------
  deploy-api:
    runs-on: ubuntu-latest
    needs: build-backend
    # Se déploie uniquement si on est sur la branche main (comme dans votre ancien script)
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-artifact
          path: ./api-deploy
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'accessitrack-api'
          package: ./api-deploy
          # Remplacez le nom du secret par celui généré par GitHub/Azure
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
