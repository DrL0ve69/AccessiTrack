trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'
  nodeVersion: '22.x'

stages:
- stage: Build_And_Test
  displayName: 'Build et Tests'
  jobs:
  - job: Backend
    displayName: 'Backend .NET 10'
    steps:
    - task: UseDotNet@2
      displayName: 'Installer .NET 10'
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: 'Restore NuGet packages'
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: 'Build solution'
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: 'Publish API'
    - task: PublishBuildArtifacts@1
      displayName: 'Publier artefact API'
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: 'Frontend Angular'
    steps:
    - task: NodeTool@0
      displayName: 'Installer Node.js'
      inputs:
        versionSpec: $(nodeVersion)
    - script: |
        cd Frontend/Accessitrack.client
        npm install
        # ON FORCE LA SORTIE DANS LE DOSSIER DIST DIRECTEMENT
        npx ng build --configuration production --output-path=dist
      displayName: 'npm install et ng build'
    - task: PublishBuildArtifacts@1
      displayName: 'Publier artefact Frontend'
      inputs:
        # CE CHEMIN DOIT MAINTENANT EXISTER GRACE A --output-path=dist
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: 'Deploiement Production'
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: 'Deployer API via OAuth'
    steps:
    - download: current
      artifact: api

    - task: ArchiveFiles@2
      displayName: 'Créer l archive ZIP'
      inputs:
        rootFolderOrFile: '$(Pipeline.Workspace)/api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/deploy.zip'
        replaceExistingArchive: true

    - task: PowerShell@2
      displayName: 'Push Zip to Azure'
      inputs:
        targetType: 'inline'
        script: |
          $rawUrl = "$(AZ_URL)"
          $cleanUrl = $rawUrl.Trim().TrimStart('.').TrimStart(':').Replace("https://", "")
          $url = "https://$cleanUrl/api/zipdeploy"
          
          $token = "$env:SYSTEM_ACCESSTOKEN"
          $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$token"))
          $headers = @{ Authorization = "Basic $base64AuthInfo" }
          
          $zipPath = "$(Build.ArtifactStagingDirectory)/deploy.zip"
          Write-Host "Tentative d'envoi vers $url ..."
          
          try {
              Invoke-RestMethod -Uri $url -Method Post -Headers $headers -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
              Write-Host "##[section]DÉPLOIEMENT RÉUSSI !"
          }
          catch {
              $msg = $_.Exception.Message
              Write-Host "##[warning] OAuth a échoué ($msg). Tentative via AZ_USER..."
              $pair = "$(AZ_USER):$(AZ_PWD)"
              $bytes = [System.Text.Encoding]::ASCII.GetBytes($pair)
              $base64 = [Convert]::ToBase64String($bytes)
              $headersSecours = @{ Authorization = "Basic $base64" }
              try {
                  Invoke-RestMethod -Uri $url -Method Post -Headers $headersSecours -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
                  Write-Host "##[section]DÉPLOIEMENT RÉUSSI via identifiants classiques !"
              }
              catch {
                  Write-Host "##[error] ÉCHEC : $($_.Exception.Message)"
                  exit 1
              }
          }
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
