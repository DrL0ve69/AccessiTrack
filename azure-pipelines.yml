trigger:
  branches:
    include:
      - main
      - dev

pool:
  name: Default

variables:
  buildConfiguration: Release
  dotnetVersion: 10.0.x
  nodeVersion: 22.x

stages:
- stage: Build_And_Test
  displayName: Build et Tests
  jobs:
  - job: Backend
    displayName: Backend .NET 10
    steps:
    - task: UseDotNet@2
      displayName: Installer .NET 10
      inputs:
        version: $(dotnetVersion)
    - script: dotnet restore Backend/AccessiTrack.slnx
      displayName: Restore NuGet packages
    - script: dotnet build Backend/AccessiTrack.slnx --configuration $(buildConfiguration) --no-restore
      displayName: Build solution
    - script: dotnet publish Backend/AccessiTrack.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact API
      inputs:
        pathToPublish: $(Build.ArtifactStagingDirectory)/api
        artifactName: api

  - job: Frontend
    displayName: Frontend Angular
    steps:
    - task: NodeTool@0
      displayName: Installer Node.js
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd Frontend/Accessitrack.client
        call npm install
        call npx ng build --configuration production
      displayName: npm install et ng build
      
    - task: PublishBuildArtifacts@1
      displayName: Publier artefact Frontend
      inputs:
        pathToPublish: 'Frontend/Accessitrack.client/dist'
        artifactName: frontend

- stage: Deploy_Production
  displayName: Deploiement Production
  dependsOn: Build_And_Test
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: accessitrack-secrets
  jobs:
  - job: Deploy_API
    displayName: Deployer API via Kudu Zip Push
    steps:
    - download: current
      artifact: api

    - powershell: |
        # 1. Charger le XML
        [xml]$xml = @'
        $(AZURE_WEBAPP_PUBLISH_PROFILE)
        '@

        # 2. Chercher le profil qui contient les infos de déploiement (souvent le premier ou celui nommé 'Web Deploy')
        # On essaie de récupérer l'URL et les accès de manière plus flexible
        $profile = $xml.publishData.publishProfile | Where-Object { $_.publishMethod -ne "ReadOnly" } | Select-Object -First 1

        if (-not $profile) {
            Write-Error "Impossible de trouver un profil de publication valide dans le secret AZURE_WEBAPP_PUBLISH_PROFILE"
            exit 1
        }

        $userName = $profile.userName
        $password = $profile.userPWD
        
        # Nettoyage de l'URL : on enlève le port (ex: :443) et on s'assure qu'elle commence par https
        $rawUrl = $profile.publishUrl
        $cleanUrl = $rawUrl.Split(':')[0]
        $apiUrl = "https://$cleanUrl/api/zipdeploy"
        
        Write-Host "Nom d'utilisateur détecté : $userName"
        Write-Host "URL cible détectée : $apiUrl"

        # 3. Créer l'en-tête d'authentification Basic
        $pair = "{0}:{1}" -f $userName, $password
        $bytes = [System.Text.Encoding]::ASCII.GetBytes($pair)
        $base64 = [Convert]::ToBase64String($bytes)
        $headers = @{ Authorization = "Basic $base64" }

        # 4. Compresser le dossier API en ZIP
        $zipPath = "$(Pipeline.Workspace)\api_deploy.zip"
        if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
        
        Write-Host "Compression du dossier : $(Pipeline.Workspace)\api"
        Compress-Archive -Path "$(Pipeline.Workspace)\api\*" -DestinationPath $zipPath -Force

        # 5. Envoyer le ZIP
        Write-Host "Envoi du fichier ZIP vers Azure..."
        try {
            Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -InFile $zipPath -ContentType "application/zip" -TimeoutSec 300
            Write-Host "Félicitations ! Le déploiement a réussi."
        }
        catch {
            Write-Error "Le déploiement a échoué : $_"
            exit 1
        }
      displayName: 'Déployer API (Direct Zip Push corrigé)'
