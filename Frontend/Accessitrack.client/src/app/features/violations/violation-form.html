<section style="max-width: 600px; margin: 2rem auto; font-family: sans-serif;">
  <h1>Nouvelle violation</h1>

  @if (serverError()) {
    <div style="color: #d32f2f; background: #fee; padding: 1rem; border-left: 4px solid; margin-bottom: 1rem;">
      {{ serverError() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-weight: bold;">Critère WCAG</label>
      <select formControlName="wcagCriterion" (change)="onCriterionChange($event)" style="width: 100%; padding: 0.5rem;">
        <option value="">-- Sélectionner --</option>
        @for (c of wcagCriteria; track c.value) {
          <option [value]="c.value">{{ c.label }}</option>
        }
      </select>
    </div>

    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-weight: bold;">Élément HTML</label>
      <input type="text" formControlName="htmlElement" style="width: 100%; padding: 0.5rem;">
    </div>

    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-weight: bold;">Description</label>
      <textarea formControlName="description" rows="4" style="width: 100%; padding: 0.5rem;"></textarea>
    </div>

    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-weight: bold;">Sévérité</label>
      @for (opt of severityOptions; track opt.value) {
        <label style="margin-right: 1rem; font-weight: normal;">
          <input type="radio" [value]="opt.value" formControlName="severity"> {{ opt.label }}
        </label>
      }
    </div>

    <div style="margin-top: 2rem; display: flex; gap: 1rem; align-items: center;">
      <button type="submit" [disabled]="isSubmitting()" 
              style="background: #0066cc; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 4px; cursor: pointer;">
        {{ isSubmitting() ? 'Envoi...' : 'Enregistrer' }}
      </button>
      <a [routerLink]="['/projects', route.snapshot.paramMap.get('projectId'), 'audits']">Annuler</a>
    </div>
  </form>
</section>
